name: CI — Tests PHP / Symfony

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  tests:
    name: PHPUnit + ParaTest
    runs-on: ubuntu-latest

    services:
      wiremock:
        image: wiremock/wiremock:3.10.0
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/__admin/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.3 + extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, sqlite3, pcov
          coverage: pcov

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: tp4/vendor
          key: composer-${{ hashFiles('tp4/**/composer.lock') }}
          restore-keys: composer-

      - name: Installation des dépendances Composer
        working-directory: tp4
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Charger les mappings WireMock
        run: |
          # Attendre que WireMock soit prêt
          for i in {1..30}; do
            if curl -s -f http://localhost:8080/__admin/health > /dev/null 2>&1; then
              echo "✓ WireMock is ready"
              break
            fi
            echo "Waiting for WireMock... ($i/30)"
            sleep 1
          done
          
          # Charger les mappings via l'API WireMock
          for mapping_file in tp4/wiremock/mappings/*.json; do
            echo "Loading mapping: $mapping_file"
            curl -s -X POST http://localhost:8080/__admin/mappings \
              -H "Content-Type: application/json" \
              -d @"$mapping_file" || echo "Warning: Failed to load $mapping_file"
          done

      - name: Création de la base de données de test
        working-directory: tp4
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Lancer les tests (parallèle)
        working-directory: tp4
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"
          WEATHER_API_URL: "http://localhost:8080"
        run: php vendor/bin/paratest --processes=2 --testdox --coverage-clover var/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: tp4/var/coverage.xml
          fail_ci_if_error: false
